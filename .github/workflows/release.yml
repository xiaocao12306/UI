name: Release

on:
  push:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      enforce:
        description: "Fail the workflow when NPM_TOKEN is missing"
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.8.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - name: Run Release Quality Gate
        run: |
          set +e
          pnpm release:gate:ci 2>&1 | tee /tmp/release-gate.log
          gate_status=${PIPESTATUS[0]}

          verify_line=$(grep -m1 "verify" /tmp/release-gate.log || true)
          coverage_line=$(grep -m1 "^All files" /tmp/release-gate.log || true)
          demo_run_line=$(grep -m1 "^Running [0-9][0-9]* tests using" /tmp/release-gate.log || true)
          demo_result_line=$(grep -m1 " passed (" /tmp/release-gate.log || true)
          demo_failed_line=$(grep -m1 " failed" /tmp/release-gate.log || true)
          demo_dist_line=$(grep -m1 "\\[demo-dist-check\\] ok:" /tmp/release-gate.log || true)
          storybook_coverage_line=$(grep -m1 "docs reference coverage:" /tmp/release-gate.log || true)
          storybook_missing_imports_line=$(grep -m1 "missing imports:" /tmp/release-gate.log || true)
          storybook_missing_files_line=$(grep -m1 "missing story files:" /tmp/release-gate.log || true)
          storybook_missing_exports_line=$(grep -m1 "missing story exports:" /tmp/release-gate.log || true)
          storybook_unreferenced_line=$(grep -m1 "unreferenced story files:" /tmp/release-gate.log || true)
          storybook_coverage_error_line=$(grep -m1 "\\[storybook-coverage-report\\] error:" /tmp/release-gate.log || true)
          storybook_docs_line=$(grep -m1 "\\[storybook-docs-import-check\\] ok:" /tmp/release-gate.log || true)
          storybook_static_line=$(grep -m1 "\\[storybook-static-check\\] ok:" /tmp/release-gate.log || true)
          storybook_a11y_line=$(grep -m1 "accessibility violation" /tmp/release-gate.log || true)
          suites_line=$(grep -m1 "^Test Suites:" /tmp/release-gate.log || true)
          tests_line=$(grep -m1 "^Tests:" /tmp/release-gate.log || true)

          {
            echo "## Release Gate (CI)"
            echo
            if [ "$gate_status" -eq 0 ]; then
              echo "- status: \`passed\`"
            else
              echo "- status: \`failed\`"
            fi
            echo "- command: \`pnpm release:gate:ci\`"
            echo "- ${verify_line:-verify: n/a}"
            echo "- ${coverage_line:-coverage summary: n/a}"
            echo "- ${demo_run_line:-demo:e2e run line: n/a}"
            echo "- ${demo_result_line:-demo:e2e result line: n/a}"
            if [ "$gate_status" -ne 0 ]; then
              echo "- ${demo_failed_line:-demo:e2e failed line: n/a}"
            fi
            echo "- ${demo_dist_line:-demo dist gate: n/a}"
            echo "- ${storybook_coverage_line:-storybook docs reference coverage: n/a}"
            echo "- ${storybook_missing_imports_line:-missing imports: n/a}"
            echo "- ${storybook_missing_files_line:-missing story files: n/a}"
            echo "- ${storybook_missing_exports_line:-missing story exports: n/a}"
            echo "- ${storybook_unreferenced_line:-unreferenced story files: n/a}"
            if [ "$gate_status" -ne 0 ]; then
              echo "- ${storybook_coverage_error_line:-storybook coverage strict error: n/a}"
            fi
            echo "- ${storybook_docs_line:-storybook docs gate: n/a}"
            echo "- ${storybook_static_line:-storybook static gate: n/a}"
            echo "- ${storybook_a11y_line:-storybook a11y scan: no violations reported}"
            echo "- ${suites_line:-Test Suites: n/a}"
            echo "- ${tests_line:-Tests: n/a}"
          } >> "$GITHUB_STEP_SUMMARY"

          exit "$gate_status"
      - name: Upload Release Gate Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-gate-logs
          path: /tmp/release-gate.log
          if-no-files-found: ignore

      - name: Run Release Dry-Run Gate
        run: pnpm release:dry-run 2>&1 | tee /tmp/release-dry-run.log

      - name: Upload Release Dry-Run Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-dry-run-logs
          path: /tmp/release-dry-run.log
          if-no-files-found: ignore

      - id: npm-token
        name: Check NPM Token
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.enforce }}" = "true" ]; then
            echo "enforce=true" >> "$GITHUB_OUTPUT"
          else
            echo "enforce=false" >> "$GITHUB_OUTPUT"
          fi

          if [ -n "${{ secrets.NPM_TOKEN }}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish Mode Summary
        run: |
          {
            echo "## Publish Mode"
            echo
            echo "- enforce mode: \`${{ steps.npm-token.outputs.enforce }}\`"
            echo "- npm token configured: \`${{ steps.npm-token.outputs.enabled }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Fail Publish (enforced mode)
        if: steps.npm-token.outputs.enabled != 'true' && steps.npm-token.outputs.enforce == 'true'
        run: |
          echo "::error title=Release Enforced::NPM_TOKEN is required when enforce=true."
          {
            echo "## npm Publish Failed"
            echo
            echo "- mode: \`enforce=true\`"
            echo "- reason: \`NPM_TOKEN\` is not configured."
            echo "- action: add repository secret \`NPM_TOKEN\`."
            echo "- guide: \`docs/secrets.md\`"
          } >> "$GITHUB_STEP_SUMMARY"
          exit 1

      - name: Create Release PR / Publish
        if: steps.npm-token.outputs.enabled == 'true'
        uses: changesets/action@v1
        with:
          version: pnpm version-packages
          publish: pnpm release
          commit: "构建(发布): 版本变更"
          title: "构建(发布): 版本变更"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create Release PR (Publish Skipped)
        if: steps.npm-token.outputs.enabled != 'true' && steps.npm-token.outputs.enforce != 'true'
        uses: changesets/action@v1
        with:
          version: pnpm version-packages
          commit: "构建(发布): 版本变更"
          title: "构建(发布): 版本变更"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Skip Publish Notice
        if: steps.npm-token.outputs.enabled != 'true' && steps.npm-token.outputs.enforce != 'true'
        run: |
          echo "::warning title=Release Publish Skipped::NPM_TOKEN is missing; Changesets PR automation will run but npm publish is skipped."
          echo "Configure secret path: GitHub -> Settings -> Secrets and variables -> Actions -> New repository secret"
          echo "Secret name: NPM_TOKEN"
          echo "Reference: docs/secrets.md"
          {
            echo "## npm Publish Skipped"
            echo
            echo "- reason: \`NPM_TOKEN\` is not configured."
            echo "- effect: release PR automation runs, but package publish step is skipped."
            echo "- fix: add repository secret \`NPM_TOKEN\`."
            echo "- guide: \`docs/secrets.md\`"
          } >> "$GITHUB_STEP_SUMMARY"
