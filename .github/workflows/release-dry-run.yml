name: Release Dry Run

on:
  pull_request:
    paths:
      - ".changeset/**"
      - ".changeset/config.json"
      - "packages/**"
      - "scripts/**"
      - "package.json"
      - "pnpm-workspace.yaml"
      - "pnpm-lock.yaml"
      - ".github/workflows/release.yml"
      - ".github/workflows/release-dry-run.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-dry-run-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dry-run:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - id: checkout
        uses: actions/checkout@v4

      - id: setup_pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.8.1

      - id: setup_node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - id: install
        run: pnpm install --frozen-lockfile

      - id: dry_run
        continue-on-error: true
        run: pnpm release:dry-run

      - id: summary
        name: Dry Run Summary
        if: always()
        run: |
          checkout_outcome="${{ steps.checkout.outcome }}"
          setup_pnpm_outcome="${{ steps.setup_pnpm.outcome }}"
          setup_node_outcome="${{ steps.setup_node.outcome }}"
          install_outcome="${{ steps.install.outcome }}"
          dry_run_outcome="${{ steps.dry_run.outcome }}"
          failed_step="none"

          if [ "${checkout_outcome}" = "failure" ]; then
            failed_step="checkout"
          elif [ "${setup_pnpm_outcome}" = "failure" ]; then
            failed_step="setup-pnpm"
          elif [ "${setup_node_outcome}" = "failure" ]; then
            failed_step="setup-node"
          elif [ "${install_outcome}" = "failure" ]; then
            failed_step="install"
          elif [ "${dry_run_outcome}" = "failure" ]; then
            failed_step="release:dry-run"
          fi

          {
            echo "## Release Dry Run Summary"
            echo ""
            echo "- checkout: ${checkout_outcome}"
            echo "- setup-pnpm: ${setup_pnpm_outcome}"
            echo "- setup-node: ${setup_node_outcome}"
            echo "- install: ${install_outcome}"
            echo "- release:dry-run: ${dry_run_outcome}"
            echo "- failed step: ${failed_step}"
          } >> "$GITHUB_STEP_SUMMARY"

          echo "failed_step=${failed_step}" >> "$GITHUB_OUTPUT"

      - name: Fail When Dry Run Gate Fails
        if: always() && steps.summary.outputs.failed_step != 'none'
        run: exit 1
