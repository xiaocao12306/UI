name: Release Dry Run

on:
  pull_request:
    paths:
      - ".changeset/**"
      - ".changeset/config.json"
      - "packages/**"
      - "scripts/**"
      - "package.json"
      - "pnpm-workspace.yaml"
      - "pnpm-lock.yaml"
      - ".github/workflows/release.yml"
      - ".github/workflows/release-dry-run.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-dry-run-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dry-run:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.8.1

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - id: install
        run: pnpm install --frozen-lockfile

      - id: dry_run
        continue-on-error: true
        run: pnpm release:dry-run

      - name: Dry Run Summary
        if: always()
        run: |
          install_outcome="${{ steps.install.outcome }}"
          dry_run_outcome="${{ steps.dry_run.outcome }}"

          {
            echo "## Release Dry Run Summary"
            echo ""
            echo "- install: ${install_outcome}"
            echo "- release:dry-run: ${dry_run_outcome}"
            if [ "${dry_run_outcome}" = "failure" ]; then
              echo "- failed step: release:dry-run"
            elif [ "${install_outcome}" = "failure" ]; then
              echo "- failed step: install"
            else
              echo "- failed step: none"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Fail When Dry Run Fails
        if: steps.dry_run.outcome == 'failure'
        run: exit 1
