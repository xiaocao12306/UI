name: Chromatic Visual Tests

on:
  pull_request:
    paths:
      - "apps/storybook/**"
      - "apps/storybook/.storybook/**"
      - "packages/**"
      - "scripts/normalize-storybook-static-metadata.mjs"
      - "package.json"
      - "pnpm-workspace.yaml"
      - "turbo.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/chromatic.yml"
  workflow_dispatch:
    inputs:
      enforce:
        description: "Fail the workflow when CHROMATIC_PROJECT_TOKEN is missing"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  chromatic:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.8.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - id: token
        name: Check Chromatic Token
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.enforce }}" = "true" ]; then
            echo "enforce=true" >> "$GITHUB_OUTPUT"
          else
            echo "enforce=false" >> "$GITHUB_OUTPUT"
          fi

          if [ -n "${{ secrets.CHROMATIC_PROJECT_TOKEN }}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Chromatic Mode Summary
        run: |
          {
            echo "## Chromatic Mode"
            echo
            echo "- trigger: \`${{ github.event_name }}\`"
            echo "- ref: \`${{ github.ref_name }}\`"
            echo "- enforce mode: \`${{ steps.token.outputs.enforce }}\`"
            echo "- chromatic token configured: \`${{ steps.token.outputs.enabled }}\`"
            echo "- token-missing policy: \`enforce=false => soft-skip\`, \`enforce=true => hard-fail\`"
            echo "- local preflight: \`pnpm release:preflight:chromatic\`"
            echo "- manual audit rerun: \`gh workflow run chromatic.yml -f enforce=true\`"
            echo "- docs: \`docs/secrets.md\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Build Storybook
        if: steps.token.outputs.enabled == 'true'
        run: pnpm storybook:build

      - name: Publish to Chromatic
        id: chromatic
        if: steps.token.outputs.enabled == 'true'
        uses: chromaui/action@v11
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          workingDir: apps/storybook
          storybookBuildDir: storybook-static
          exitOnceUploaded: true
          autoAcceptChanges: main

      - name: Chromatic Summary
        if: steps.token.outputs.enabled == 'true' && always()
        run: |
          {
            echo "## Chromatic Upload"
            echo
            echo "- status: \`${{ steps.chromatic.outcome }}\`"
            echo "- build url: ${{ steps.chromatic.outputs.buildUrl || 'n/a' }}"
            echo "- storybook url: ${{ steps.chromatic.outputs.storybookUrl || 'n/a' }}"
            echo "- change count: ${{ steps.chromatic.outputs.changeCount || 'n/a' }}"
            echo "- error count: ${{ steps.chromatic.outputs.errorCount || 'n/a' }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Fail Chromatic (enforced mode)
        if: steps.token.outputs.enabled != 'true' && steps.token.outputs.enforce == 'true'
        run: |
          echo "::error title=Chromatic Enforced::CHROMATIC_PROJECT_TOKEN is required when enforce=true."
          echo "Fix path: GitHub -> Settings -> Secrets and variables -> Actions -> New repository secret"
          echo "Secret name: CHROMATIC_PROJECT_TOKEN"
          echo "Local check: pnpm release:preflight:chromatic"
          echo "Rerun audit: gh workflow run chromatic.yml -f enforce=true"
          {
            echo "## Chromatic Upload Failed"
            echo
            echo "- status: \`failed\`"
            echo "- mode: \`enforce=true\`"
            echo "- reason: \`CHROMATIC_PROJECT_TOKEN\` is not configured."
            echo "- build url: n/a"
            echo "- storybook url: n/a"
            echo "- change count: n/a"
            echo "- error count: n/a"
            echo "- action: add repository secret \`CHROMATIC_PROJECT_TOKEN\`."
            echo "- github settings: \`Settings -> Secrets and variables -> Actions\`"
            echo "- local verify: \`pnpm release:preflight:chromatic\`"
            echo "- rerun command: \`gh workflow run chromatic.yml -f enforce=true\`"
            echo "- guide: \`docs/secrets.md\`"
          } >> "$GITHUB_STEP_SUMMARY"
          exit 1

      - name: Skip Chromatic
        if: steps.token.outputs.enabled != 'true' && steps.token.outputs.enforce != 'true'
        run: |
          echo "::warning title=Chromatic Skipped::CHROMATIC_PROJECT_TOKEN is missing; visual regression upload is skipped."
          echo "Configure secret path: GitHub -> Settings -> Secrets and variables -> Actions -> New repository secret"
          echo "Secret name: CHROMATIC_PROJECT_TOKEN"
          echo "Local check: pnpm release:preflight:chromatic"
          echo "Manual audit rerun: gh workflow run chromatic.yml -f enforce=true"
          echo "Reference: docs/secrets.md"
          {
            echo "## Chromatic Upload Skipped"
            echo
            echo "- status: \`skipped\`"
            echo "- mode: \`enforce=false\`"
            echo "- reason: \`CHROMATIC_PROJECT_TOKEN\` is not configured."
            echo "- build url: n/a"
            echo "- storybook url: n/a"
            echo "- change count: n/a"
            echo "- error count: n/a"
            echo "- effect: Storybook visual regression baseline/upload is skipped for this run."
            echo "- fix: add repository secret \`CHROMATIC_PROJECT_TOKEN\`."
            echo "- github settings: \`Settings -> Secrets and variables -> Actions\`"
            echo "- local verify: \`pnpm release:preflight:chromatic\`"
            echo "- manual audit rerun: \`gh workflow run chromatic.yml -f enforce=true\`"
            echo "- guide: \`docs/secrets.md\`"
          } >> "$GITHUB_STEP_SUMMARY"
