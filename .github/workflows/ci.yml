name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.8.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
      - run: pnpm exec playwright install --with-deps chromium
      - name: Run Storybook Interaction Gate
        run: |
          set +e
          pnpm storybook:test:ci 2>&1 | tee /tmp/storybook-gate.log
          gate_status=${PIPESTATUS[0]}

          stories_total_line=$(grep -m1 "stories total:" /tmp/storybook-gate.log || true)
          coverage_line=$(grep -m1 "docs reference coverage:" /tmp/storybook-gate.log || true)
          docs_gate_line=$(grep -m1 "\\[storybook-docs-import-check\\] ok:" /tmp/storybook-gate.log || true)
          static_gate_line=$(grep -m1 "\\[storybook-static-check\\] ok:" /tmp/storybook-gate.log || true)
          suites_line=$(grep -m1 "^Test Suites:" /tmp/storybook-gate.log || true)
          tests_line=$(grep -m1 "^Tests:" /tmp/storybook-gate.log || true)

          {
            echo "## Storybook Interaction Gate"
            echo
            if [ "$gate_status" -eq 0 ]; then
              echo "- status: \`passed\`"
            else
              echo "- status: \`failed\`"
            fi
            echo "- ${stories_total_line:-stories total: n/a}"
            echo "- ${coverage_line:-docs reference coverage: n/a}"
            echo "- ${docs_gate_line:-docs import gate: n/a}"
            echo "- ${static_gate_line:-static sync gate: n/a}"
            echo "- ${suites_line:-Test Suites: n/a}"
            echo "- ${tests_line:-Tests: n/a}"
          } >> "$GITHUB_STEP_SUMMARY"

          exit "$gate_status"

  demo-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.8.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - name: Run Demo Quality Gate
        run: |
          set +e
          pnpm demo:e2e 2>&1 | tee /tmp/demo-e2e.log
          e2e_status=${PIPESTATUS[0]}

          pnpm demo:dist:check 2>&1 | tee /tmp/demo-dist.log
          dist_status=${PIPESTATUS[0]}

          e2e_result_line=$(grep -m1 " passed (" /tmp/demo-e2e.log || true)
          e2e_failed_line=$(grep -m1 " failed" /tmp/demo-e2e.log || true)
          dist_ok_line=$(grep -m1 "\\[demo-dist-check\\] ok:" /tmp/demo-dist.log || true)

          {
            echo "## Demo Quality Gate"
            echo
            if [ "$e2e_status" -eq 0 ]; then
              echo "- demo:e2e status: \`passed\`"
            else
              echo "- demo:e2e status: \`failed\`"
            fi
            echo "- ${e2e_result_line:-demo:e2e results: n/a}"
            if [ "$e2e_status" -ne 0 ]; then
              echo "- ${e2e_failed_line:-demo:e2e failed count: n/a}"
            fi
            if [ "$dist_status" -eq 0 ]; then
              echo "- demo:dist:check status: \`passed\`"
            else
              echo "- demo:dist:check status: \`failed\`"
            fi
            echo "- ${dist_ok_line:-demo dist sync line: n/a}"
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$e2e_status" -ne 0 ] || [ "$dist_status" -ne 0 ]; then
            exit 1
          fi
